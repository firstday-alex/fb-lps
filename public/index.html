<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Facebook Ads LP Viewer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Facebook Ads &mdash; Top Spend</h1>
    <nav style="display:flex;gap:8px;margin-left:auto;margin-right:16px">
      <a href="/ad-diagnostic.html" style="color:rgba(255,255,255,0.85);text-decoration:none;font-size:0.82rem;border:1px solid rgba(255,255,255,0.3);padding:5px 12px;border-radius:6px;white-space:nowrap">Ad Diagnostic</a>
      <a href="/conversion-impact.html" style="color:rgba(255,255,255,0.85);text-decoration:none;font-size:0.82rem;border:1px solid rgba(255,255,255,0.3);padding:5px 12px;border-radius:6px;white-space:nowrap">CVR Diagnosis by UTM</a>
      <a href="/cvr-decomposition.html" style="color:rgba(255,255,255,0.85);text-decoration:none;font-size:0.82rem;border:1px solid rgba(255,255,255,0.3);padding:5px 12px;border-radius:6px;white-space:nowrap">CVR Decomposition</a>
      <a href="/ad-set-fatigue.html" style="color:rgba(255,255,255,0.85);text-decoration:none;font-size:0.82rem;border:1px solid rgba(255,255,255,0.3);padding:5px 12px;border-radius:6px;white-space:nowrap">Ad-Set Fatigue</a>
      <a href="/campaign-analysis.html" style="color:rgba(255,255,255,0.85);text-decoration:none;font-size:0.82rem;border:1px solid rgba(255,255,255,0.3);padding:5px 12px;border-radius:6px;white-space:nowrap">Campaign Analysis</a>
    </nav>
    <div id="auth-section"></div>
  </header>

  <main>
    <section id="account-section" class="hidden">
      <label for="account-select">Ad Account:</label>
      <select id="account-select">
        <option value="">-- Choose an account --</option>
      </select>
      <label for="date-range">Date Range:</label>
      <select id="date-range">
        <option value="yesterday">Yesterday</option>
        <option value="last_3d" selected>Last 3 Days</option>
        <option value="last_7d">Last 7 Days</option>
        <option value="last_14d">Last 14 Days</option>
        <option value="last_30d">Last 30 Days</option>
        <option value="custom">Custom</option>
      </select>
      <input type="date" id="date-start" class="hidden">
      <input type="date" id="date-end" class="hidden">
      <label for="ads-limit">Show:</label>
      <select id="ads-limit">
        <option value="10">Top 10</option>
        <option value="25" selected>Top 25</option>
        <option value="50">Top 50</option>
      </select>
      <button id="load-ads-btn" class="btn btn-primary">Load Top Ads</button>
    </section>

    <div id="loading" class="hidden">
      <div class="spinner"></div>
      <p>Fetching ad data&hellip;</p>
    </div>

    <div id="error-message" class="hidden"></div>

    <div id="campaign-filter-bar" class="hidden">
      <label for="campaign-filter">Campaign:</label>
      <select id="campaign-filter">
        <option value="">All Campaigns</option>
      </select>
      <span id="campaign-filter-count" class="filter-count"></span>
    </div>

    <div id="table-container" class="hidden">
      <table id="ads-table">
        <thead>
          <tr>
            <th class="col-rank">#</th>
            <th class="col-name">Ad Name</th>
            <th class="col-lp">Landing Page</th>
            <th class="col-num">Spend</th>
            <th class="col-num">CPM</th>
            <th class="col-num">Impr</th>
            <th class="col-num">Out. Clicks</th>
            <th class="col-num">LP Views</th>
            <th class="col-num col-shopify">Sessions</th>
            <th class="col-num col-shopify">Bounce</th>
            <th class="col-num col-shopify">ATC</th>
            <th class="col-num col-shopify">CVR</th>
            <th class="col-num col-shopify">Orders</th>
          </tr>
        </thead>
        <tbody id="ads-tbody"></tbody>
      </table>
    </div>

    <div id="load-more-container">
      <button id="load-more-btn" class="btn btn-load-more" onclick="loadMoreAds()" style="display:none">Load More Ads</button>
    </div>

    <div id="empty-state" class="hidden">
      <p>No ads with spend found for the selected date range.</p>
    </div>
  </main>

  <!-- Detail panel (slide-in) -->
  <div id="detail-overlay" class="hidden" onclick="closeDetail(event)">
    <div id="detail-panel">
      <button class="detail-close" onclick="closeDetail()">&times;</button>
      <div id="detail-content"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
