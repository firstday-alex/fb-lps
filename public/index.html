<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Facebook Ads LP Viewer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Facebook Ads &mdash; Top Spend</h1>
    <div id="auth-section"></div>
  </header>

  <main>
    <section id="account-section" class="hidden">
      <label for="account-select">Ad Account:</label>
      <select id="account-select">
        <option value="">-- Choose an account --</option>
      </select>
      <label for="date-range">Date Range:</label>
      <select id="date-range">
        <option value="yesterday">Yesterday</option>
        <option value="last_3d" selected>Last 3 Days</option>
        <option value="last_7d">Last 7 Days</option>
        <option value="last_14d">Last 14 Days</option>
        <option value="last_30d">Last 30 Days</option>
        <option value="custom">Custom</option>
      </select>
      <input type="date" id="date-start" class="hidden">
      <input type="date" id="date-end" class="hidden">
      <label for="ads-limit">Show:</label>
      <select id="ads-limit">
        <option value="10">Top 10</option>
        <option value="25" selected>Top 25</option>
        <option value="50">Top 50</option>
      </select>
      <button id="load-ads-btn" class="btn btn-primary">Load Top Ads</button>
    </section>

    <div id="loading" class="hidden">
      <div class="spinner"></div>
      <p>Fetching ad data&hellip;</p>
    </div>

    <div id="error-message" class="hidden"></div>

    <div id="campaign-filter-bar" class="hidden">
      <label for="campaign-filter">Campaign:</label>
      <select id="campaign-filter">
        <option value="">All Campaigns</option>
      </select>
      <span id="campaign-filter-count" class="filter-count"></span>
    </div>

    <section id="ads-grid" class="hidden"></section>

    <div id="load-more-container">
      <button id="load-more-btn" class="btn btn-load-more" onclick="loadMoreAds()" style="display:none">Load More Ads</button>
    </div>

    <div id="empty-state" class="hidden">
      <p>No ads with spend found for the selected date range.</p>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
